[dmenu]
dmenu_command = rofi -theme ~/.config/rofi/dmenu.rasi
pinentry = pinentry
title_path = false

[dmenu_passphrase]
obscure = false
obscure_color = #303030

[database]
database_1 = ~/pass.kdbx
type_library = xdotool
pw_cache_period_min = 720
terminal=alacritty
autotype_default = {USERNAME}{TAB}{PASSWORD}{ENTER}

[password_chars]
lower = abcdefghjkmnpqrstuvwxyz
upper = ABCDEFGHJKMNPQRSTUVWXYZ
digits = 23456789
punctuation = !"#$%%&'()*+,-./:;<=>?@[\]^_`{}~"
